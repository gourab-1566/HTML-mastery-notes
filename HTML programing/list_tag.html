<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List tags</title>
</head>

<body>
    <!--<ul> = unordered list
        <ol> = ordered list-->
    <ul>
        <li>mango</li>
        <ul>
            <li>color: yellow</li>
            <li>season : summer</li>
        </ul>
        <li>banana</li>
        <ul>
            <li>color : yellow</li>
        </ul>
        <li>apple</li>
        <ul>
            <li>color : red</li>
            <li>season: winter</li>
        </ul>
        <br>
        <ol>
            <li>mango</li>
            <li>banana</li>
            <li>apple</li>
        </ol>
</body>

</html>
